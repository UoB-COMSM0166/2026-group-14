<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Group 14</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .play-link {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(145deg, #F7DC6F, #D4AC02);
      border: 3px solid #B8860B;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(212, 172, 2, 0.4);
    }

    .play-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(212, 172, 2, 0.5);
    }

    .play-link:active {
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <h1>2026 Group 14</h1>
  <a href="game/index.html" class="play-link">🎮 Play Game</a>
</body>

</html>
